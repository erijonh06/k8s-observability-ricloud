name: Build and publish Docker images to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./app/api
          file: ./app/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/erijon-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/erijon-api:${{ github.sha }}

      - name: Build and push Worker image
        # worker is a simple console app - publish then build image
        run: |
          dotnet --version || true
        shell: bash

      - name: Publish worker app
        working-directory: app/worker
        run: dotnet publish -c Release -o ./publish /p:UseAppHost=false

      - name: Build and push Worker image (Docker)
        uses: docker/build-push-action@v4
        with:
          context: ./app/worker
          file: ./app/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/erijon-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/erijon-worker:${{ github.sha }}
